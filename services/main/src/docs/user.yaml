openapi: 3.0.0
paths:
  /api/user/me:
    get:
      summary: Get user profile
      tags:
        - User
      description: Get current user's profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User profile retrieved
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 123
                      email:
                        type: string
                        example: user@example.com
                      name:
                        type: string
                        example: John Doe
                      number:
                        type: string
                        example: "+919876543210"
                      emailVerified:
                        type: boolean
                        example: true
                      role:
                        type: string
                        example: USER
                      walletID:
                        type: string
                        example: wallet_def456
                      createdAt:
                        type: string
                        format: date-time
                      dob:
                        type: string
                        format: date
                      address:
                        type: object
                        properties:
                          address:
                            type: string
                            example: 123 Main St
                          country:
                            type: string
                            example: USA
                          state:
                            type: string
                            example: California
        "401":
          description: Unauthorized

  /api/user/update-user:
    post:
      summary: Update user profile
      tags:
        - User
      description: Update user profile information
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                number:
                  type: string
                  example: "+919876543211"
      responses:
        "200":
          description: User profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User profile updated
                  data:
                    type: object
                    properties:
                      userId:
                        type: string
                      number:
                        type: string
                      updated:
                        type: boolean
                        example: true
  /api/user/update-email:
    post:
      summary: Update email address
      tags:
        - User
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: new@example.com
      responses:
        "200":
          description: Email updated, verification required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Email updated successfully. Please verify your new email address.
                  data:
                    type: object
                    properties:
                      email:
                        type: string
                      emailVerified:
                        type: boolean
                        example: false

  /api/user/deactivate:
    post:
      summary: Deactivate account
      tags:
        - User
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account deactivated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      deactivated:
                        type: boolean

  /api/user/delete:
    post:
      summary: Delete account permanently
      tags:
        - User
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
